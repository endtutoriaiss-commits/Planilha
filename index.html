<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Gamer Dash</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-blue: #00f2ff;
            --neon-red: #ff3131;
            --bg-dark: #050505;
            --panel-bg: #111;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        h1 {
            color: var(--neon-blue);
            text-align: center;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid var(--neon-blue);
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: none;
            border: none;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            outline: none;
            padding: 5px 0;
            border-bottom: 1px dashed #444;
        }

        .target-box {
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid var(--neon-green);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        .target-box span {
            display: block;
            font-size: 2rem;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        button.main-btn {
            width: 100%;
            padding: 15px;
            background: var(--neon-green);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            color: black;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #008f24;
        }

        button.main-btn:active { transform: translateY(2px); box-shadow: none; }

        .history-table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            font-size: 0.75rem;
        }

        th { text-align: left; color: #666; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; }

        .positive { color: var(--neon-green); }
        .negative { color: var(--neon-red); }

        .btn-delete {
            background: none;
            border: 1px solid #444;
            color: #888;
            cursor: pointer;
            border-radius: 4px;
            padding: 2px 6px;
        }

        .btn-delete:hover { border-color: var(--neon-red); color: var(--neon-red); }

        #reality-check {
            display: none;
            background: var(--neon-red);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.8rem;
            text-align: center;
            font-weight: bold;
            border: 2px solid white;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>Sniper Dashboard</h1>

    <div class="stat-card">
        <label>Saldo da Banca ($)</label>
        <input type="number" id="saldo" step="0.01" value="100.00" oninput="calcularMeta()">
    </div>

    <div class="stat-card">
        <label>Meta Desejada (%)</label>
        <input type="number" id="porcentagem" step="0.1" placeholder="Ex: 5" oninput="calcularMeta()">
    </div>

    <div class="target-box">
        <label>Objetivo Financeiro de Hoje</label>
        <span id="valor-alvo">$ 0.00</span>
    </div>

    <div class="stat-card" style="border-left-color: var(--neon-green);">
        <label>Resultado do Dia ($)</label>
        <input type="number" id="resultado" step="0.01" placeholder="Ex: 10.00 ou -5.00">
    </div>

    <button class="main-btn" onclick="salvarProgresso()">Registrar Missão</button>

    <div id="reality-check"></div>

    <table class="history-table">
        <thead>
            <tr>
                <th>LOG</th>
                <th>INI</th>
                <th>RESULT</th>
                <th>FINAL</th>
                <th>X</th>
            </tr>
        </thead>
        <tbody id="log-corpo"></tbody>
    </table>
</div>

<script>
    // Gerenciador de Sons (Links públicos de sons gamer)
    const soundWin = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3'); 
    const soundAlert = new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3');

    let logs = JSON.parse(localStorage.getItem('sniper_logs')) || [];

    function calcularMeta() {
        const saldo = parseFloat(document.getElementById('saldo').value) || 0;
        const perc = parseFloat(document.getElementById('porcentagem').value) || 0;
        const alvo = saldo * (perc / 100);
        document.getElementById('valor-alvo').innerText = `$ ${alvo.toFixed(2)}`;
    }

    function salvarProgresso() {
        const saldoInput = document.getElementById('saldo');
        const saldoIni = parseFloat(saldoInput.value);
        const res = parseFloat(document.getElementById('resultado').value);
        const msgCheck = document.getElementById('reality-check');

        if (isNaN(res)) return alert("Insira o resultado obtido!");

        const saldoFinal = saldoIni + res;
        
        // Efeito Sonoro de Sucesso
        if(res > 0) soundWin.play();

        // Alerta CDB (Se ganhar mais de 1% no dia)
        if (res > (saldoIni * 0.01)) {
            soundAlert.play();
            msgCheck.style.display = 'block';
            msgCheck.innerText = `SISTEMA: Lucro detectado acima de 1%! Você superou o rendimento ANUAL de muitos bancos em 24h. PROTEJA O CAPITAL.`;
        } else {
            msgCheck.style.display = 'none';
        }

        logs.unshift({
            id: Date.now(),
            data: new Date().toLocaleDateString('pt-BR'),
            inicial: saldoIni,
            res: res,
            final: saldoFinal
        });

        localStorage.setItem('sniper_logs', JSON.stringify(logs));
        
        saldoInput.value = saldoFinal.toFixed(2);
        document.getElementById('resultado').value = '';
        
        renderizarTabela();
        calcularMeta();
    }

    function excluirLinha(id) {
        if(confirm("Deseja apagar este registro?")) {
            logs = logs.filter(item => item.id !== id);
            localStorage.setItem('sniper_logs', JSON.stringify(logs));
            
            // Ajusta o saldo para o valor do último log restante
            if (logs.length > 0) {
                document.getElementById('saldo').value = logs[0].final.toFixed(2);
            }
            
            renderizarTabela();
            calcularMeta();
        }
    }

    function renderizarTabela() {
        const corpo = document.getElementById('log-corpo');
        corpo.innerHTML = '';
        logs.forEach(item => {
            corpo.innerHTML += `
                <tr>
                    <td>${item.data}</td>
                    <td>$${item.inicial.toFixed(2)}</td>
                    <td class="${item.res >= 0 ? 'positive' : 'negative'}">${item.res >= 0 ? '+' : ''}${item.res.toFixed(2)}</td>
                    <td>$${item.final.toFixed(2)}</td>
                    <td><button class="btn-delete" onclick="excluirLinha(${item.id})">🗑️</button></td>
                </tr>
            `;
        });
    }

    window.onload = () => {
        if (logs.length > 0) {
            document.getElementById('saldo').value = logs[0].final.toFixed(2);
        }
        renderizarTabela();
        calcularMeta();
    };
</script>

</body>
</html>
